<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- Loredex mark: shared index ring, overlaid markdown files, context chip.
       Matches the hero-GIF identity: deep navy, gold dex ring, paper cards. -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#182032"/>
      <stop offset="1" stop-color="#111624"/>
    </linearGradient>
  </defs>
  <rect x="100" y="100" width="824" height="824" rx="186" fill="url(#bg)"/>
  <!-- dex ring: the shared index -->
  <circle cx="512" cy="512" r="298" fill="#1C2536"/>
  <circle cx="512" cy="512" r="298" fill="none" stroke="#D9A441" stroke-width="20"/>
  <!-- back file, tilted -->
  <g transform="rotate(-9 470 520)">
    <rect x="340" y="360" width="260" height="330" rx="26" fill="#E9E4D7"/>
    <rect x="378" y="430" width="150" height="18" rx="9" fill="#C6BFAE"/>
    <rect x="378" y="478" width="184" height="18" rx="9" fill="#C6BFAE"/>
    <rect x="378" y="526" width="120" height="18" rx="9" fill="#C6BFAE"/>
  </g>
  <!-- front markdown file with folded corner -->
  <g transform="rotate(5 560 540)">
    <path d="M 440 380 H 640 L 720 460 V 730 A 26 26 0 0 1 694 756 H 466 A 26 26 0 0 1 440 730 Z" fill="#FAF8F1"/>
    <path d="M 640 380 L 720 460 H 666 A 26 26 0 0 1 640 434 Z" fill="#D8D2C2"/>
    <rect x="484" y="500" width="160" height="18" rx="9" fill="#BFB8A6"/>
    <rect x="484" y="548" width="192" height="18" rx="9" fill="#BFB8A6"/>
    <text x="486" y="700" font-family="Menlo, 'Courier New', monospace" font-size="86" font-weight="bold" fill="#2B3242">M↓</text>
  </g>
  <!-- context chip -->
  <g transform="rotate(-4 700 400)">
    <rect x="596" y="330" width="212" height="118" rx="40" fill="#E0A83E"/>
    <text x="702" y="410" font-family="Menlo, 'Courier New', monospace" font-size="66" font-weight="bold" fill="#131826" text-anchor="middle">ctx</text>
  </g>
</svg>
