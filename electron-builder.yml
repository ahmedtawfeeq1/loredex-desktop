# Loredex Desktop packaging — macOS / Windows / Linux (built per-OS in CI, see
# .github/workflows/release.yml). Native better-sqlite3 must be compiled on the
# target OS, so each platform builds on its own runner; local `npm run dist`
# still does macOS arm64 only.
# TODO(story 1.8): code signing + notarization — macOS Developer ID (hardened
# runtime, notarytool + staple), Windows OV/EV cert. Unsigned for now.
appId: dev.loredex.desktop
productName: Loredex
copyright: © 2026 Ahmed Tawfeeq — MIT license
directories:
  output: dist
files:
  - out/**
  # node-pty win32 prebuilds carry ~35 MB of .pdb debug symbols — never ship them
  - '!**/node_modules/node-pty/prebuilds/**/*.pdb'
# node-pty's spawn-helper must exist as a real on-disk executable (posix_spawn
# can't exec inside an asar); node-pty rewrites app.asar → app.asar.unpacked
# paths itself, so unpacking the module is all that's needed.
asarUnpack:
  - '**/node_modules/node-pty/**'
  # ACP agent panels: the adapters are spawned as real node processes reading
  # from disk, so they + their FULL dependency closure must live OUTSIDE
  # app.asar — an UNPACKED ESM package cannot resolve a dep that stays PACKED in
  # the asar (hit in v0.9.1: zod, hoisted to the root node_modules, was packed →
  # "Cannot find package 'zod'" crashed both providers on startup). The scopes
  # cover the adapters + native claude/codex binaries; the loose names are their
  # hoisted deps (zod = the sdk's; diff/open/vscode-jsonrpc = codex-acp's).
  - '**/node_modules/@agentclientprotocol/**'
  - '**/node_modules/@anthropic-ai/**'
  - '**/node_modules/@openai/**'
  - '**/node_modules/zod/**'
  - '**/node_modules/diff/**'
  - '**/node_modules/open/**'
  - '**/node_modules/vscode-jsonrpc/**'
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  minimumSystemVersion: '14.0'
win:
  # electron-builder converts the 1024px PNG to the .ico Windows needs
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  category: Development
  synopsis: Product-knowledge desktop for coding-agent teams
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
