# Loredex Desktop packaging — macOS / Windows / Linux (built per-OS in CI, see
# .github/workflows/release.yml). Native better-sqlite3 must be compiled on the
# target OS, so each platform builds on its own runner; local `npm run dist`
# still does macOS arm64 only.
# TODO(story 1.8): code signing + notarization — macOS Developer ID (hardened
# runtime, notarytool + staple), Windows OV/EV cert. Unsigned for now.
appId: dev.loredex.desktop
productName: Loredex
copyright: © 2026 Ahmed Tawfeeq — MIT license
directories:
  output: dist
files:
  - out/**
  # node-pty win32 prebuilds carry ~35 MB of .pdb debug symbols — never ship them
  - '!**/node_modules/node-pty/prebuilds/**/*.pdb'
# node-pty's spawn-helper must exist as a real on-disk executable (posix_spawn
# can't exec inside an asar); node-pty rewrites app.asar → app.asar.unpacked
# paths itself, so unpacking the module is all that's needed.
asarUnpack:
  - '**/node_modules/node-pty/**'
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch: [arm64]
    - target: zip
      arch: [arm64]
  minimumSystemVersion: '14.0'
win:
  # electron-builder converts the 1024px PNG to the .ico Windows needs
  icon: build/icon.png
  target:
    - target: nsis
      arch: [x64]
nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
linux:
  icon: build/icon.png
  category: Development
  synopsis: Product-knowledge desktop for coding-agent teams
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
