# CI — unsigned build + tests on every PR (architecture.md#testing-strategy).
# TODO(story 1.8): signing/notarization lives in release.yml, not here. This
# workflow intentionally builds UNSIGNED (CSC_IDENTITY_AUTO_DISCOVERY=false).
name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: macos-latest # arm64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # TODO(release): loredex is a local file: dependency for v0.1. Replace the
      # sibling checkout below with the exact-pinned npm release before shipping.
      - name: Check out and build sibling loredex (file: dependency)
        run: |
          git clone --depth 1 https://github.com/ahmedtawfeeq1/loredex ../loredex
          cd ../loredex && npm ci && npm run build
      - run: npm ci
      - run: npm run typecheck
      - run: npm test
      # Native-module smoke vs the PACKAGED Electron ABI (stories 9.2/9.3,
      # risk 5): rebuild better-sqlite3 + @parcel/watcher for the pinned
      # Electron, run the smoke suite inside Electron's own node
      # (ELECTRON_RUN_AS_NODE keeps the Electron ABI), then restore the node
      # ABI for the steps after. Reruns on every Electron/module bump by
      # construction (npm ci installs the pins).
      - name: Native smoke vs packaged Electron ABI
        run: |
          npx electron-builder install-app-deps
          ELECTRON_RUN_AS_NODE=1 npx electron node_modules/vitest/vitest.mjs run tests/native-smoke
          npm rebuild better-sqlite3 @parcel/watcher
      - name: Build unsigned DMG
        run: npm run dist
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
      - uses: actions/upload-artifact@v4
        with:
          name: loredex-desktop-dmg
          path: dist/*.dmg

  # E2E Nimbus suite (story 6.3) — the executable M1+M2 DoD and the release
  # gate. Module-level (no Electron, no display): a committed Nimbus-vault
  # fixture seeded into sandboxed local bare remotes, driven over the real
  # IPC seam. Deterministic — no LLM, no network beyond the runner's disk.
  e2e:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      # TODO(release): same sibling checkout as `build` until loredex 2.2.0
      # is published and the file: pin is replaced.
      - name: Check out and build sibling loredex (file: dependency)
        run: |
          git clone --depth 1 https://github.com/ahmedtawfeeq1/loredex ../loredex
          cd ../loredex && npm ci && npm run build
      - run: npm ci
      - run: npm run test:e2e
